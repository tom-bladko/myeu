#
# basic buildings
#

---

buildings:
  farmlands:
    name: "Farmlands"
    image: "farm.png"
    max_levels: 1

    modifiers:
      mod_population_growth: 3
      mod_population_supply: 10

    build_cost: 300
    build_time: 6


  barracks:
    name: "Barracks"
    image: "barracks.png"
    max_levels: 1

    modifiers:
      mod_army_manpower: 2.0
      mod_army_morale: 0.5
      mod_army_training: 1

    build_cost: 300
    build_time: 6


  fort:
    name: "Fortification"
    image: "fort.png"
    max_levels: 5

    modifiers:
      mod_fort_units: 5
      mod_fort_supplies: 3

    build_cost: 300
    build_time: 6


  shipyard:
    name: "Shipyard"
    image: "shipyard.png"
    max_levels: 1

    modifiers:
      mod_navy_manpower: 5
      mod_navies_max: 1
      mod_explorer: 0.1
      mod_advisor: 0.1
      mod_merchant: 0.5

    build_cost: 300
    build_time: 6


  workshop:
    name: "Workshop"
    image: "workshop.png"
    max_levels: 1

    modifiers:
      mod_production_income: 1.5

    build_cost: 300
    build_time: 6


  market:
    name: "Market"
    image: "market.png"
    max_levels: 1

    modifiers:
      mod_trade_value: 1.5

    build_cost: 300
    build_time: 6


  library:
    name: "Library"
    image: "library.png"
    max_levels: 1

    modifiers:
      mod_inventor: 0.2
      mod_inventors_max: 0.1
      mod_stab_cost: 0.05

    build_cost: 300
    build_time: 6

  temple:
    name: "Temple"
    image: "temple.png"
    max_levels: 1

    modifiers:
      mod_revolt_risk: -2
      mod_missionary: 0.5
      mod_missionaries_max: 0.1
      mod_stab_cost: -0.05

    build_cost: 300
    build_time: 6

  roads:
    name: "Roads"
    image: "roads.png"
    max_levels: 1

    modifiers:
      mod_production_income: 1.1
      mod_trade_value: 1.1
      mod_land_movement_cost: 0.75

    build_cost: 300
    build_time: 6